name: Test Actions

on:
  pull_request:
  push:
    branches:
      - main
      - "releases/*"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate action YAML
        run: |
          python3 -c "import yaml, sys; yaml.safe_load(open('register-block/action.yml')); yaml.safe_load(open('get-blocks/action.yml'))"
